<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toshiba / Viessmann Cjenik</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --red: #e8320a; --red-dark: #c42a08; --red-light: #fdf1ee; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
  }
  #login-screen-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* LOGIN */
  #login-screen {
    background: #fff;
    border-radius: 8px;
    padding: 48px 40px;
    width: 360px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.10);
  }
  #login-screen .brand { margin-bottom: 32px; }
  #login-screen .brand img { height: 44px; display: block; }
  #login-screen h1 {
    font-size: 22px; font-weight: 600; color: #111; margin-bottom: 28px;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block; font-size: 12px; font-weight: 600; color: #555;
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px;
  }
  .field .input-wrap { position: relative; }
  .field input {
    width: 100%; padding: 10px 36px 10px 12px;
    border: 1.5px solid #ddd; border-radius: 6px;
    font-size: 14px; outline: none; transition: border-color 0.15s;
  }
  .field input:focus { border-color: var(--red); }
  .toggle-pw {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: #aaa;
    padding: 0; display: flex; align-items: center;
  }
  .toggle-pw:hover { color: #555; }
  #login-error {
    color: #c0392b; font-size: 13px; margin-bottom: 12px; display: none;
  }
  .btn-primary {
    width: 100%; padding: 11px; background: var(--red); color: #fff;
    border: none; border-radius: 6px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--red-dark); }

  /* APP */
  #app-screen {
    display: none; width: 100%; min-height: 100vh;
    background: #f0f2f5; flex-direction: column;
  }
  header {
    background: #fff; border-bottom: 1px solid #e5e7eb;
    padding: 14px 32px; display: flex;
    align-items: center; justify-content: space-between;
  }
  .header-logo img { height: 44px; }
  .logout-btn {
    font-size: 12px; color: #888; background: none; border: none;
    cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: background 0.1s;
  }
  .logout-btn:hover { background: #f3f4f6; color: #333; }

  main { max-width: 860px; margin: 40px auto; padding: 0 24px; width: 100%; }

  .search-box {
    background: #fff; border-radius: 8px;
    padding: 28px 28px 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07); margin-bottom: 28px;
  }
  .search-box h2 { font-size: 15px; font-weight: 600; color: #111; margin-bottom: 6px; }
  .search-box p { font-size: 13px; color: #777; margin-bottom: 16px; }

  textarea {
    width: 100%; height: 140px; padding: 10px 12px;
    border: 1.5px solid #ddd; border-radius: 6px;
    font-size: 13px; font-family: 'Courier New', monospace;
    resize: vertical; outline: none; transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--red); }

  .search-row {
    display: flex; align-items: center; gap: 12px; margin-top: 12px;
  }
  .btn-search {
    padding: 10px 24px; background: var(--red); color: #fff;
    border: none; border-radius: 6px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-search:hover { background: var(--red-dark); }
  .btn-clear {
    padding: 10px 16px; background: none; color: #888;
    border: 1.5px solid #ddd; border-radius: 6px; font-size: 13px;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-clear:hover { border-color: #bbb; color: #333; }
  #result-count { font-size: 13px; color: #888; margin-left: auto; }

  /* TABLE */
  #results-wrap { display: none; }
  .results-card {
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: #f8f9fb; border-bottom: 2px solid #e5e7eb; }
  th {
    padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.07em; color: #777; white-space: nowrap;
  }
  td {
    padding: 12px 16px; border-bottom: 1px solid #f0f2f5;
    color: #222; vertical-align: middle;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #fdf8f7; }
  .code { font-family: 'Courier New', monospace; font-size: 12px; }
  .price-main { font-weight: 600; color: #111; }
  .price-disc { color: var(--red); font-weight: 500; }
  .badge-notfound {
    display: inline-block; font-size: 10px; padding: 2px 7px;
    background: #f3f4f6; color: #999; border-radius: 10px;
    font-weight: 600; letter-spacing: 0.04em;
  }
  .badge-noinput {
    display: inline-block; font-size: 10px; padding: 2px 7px;
    background: #fff3cd; color: #856404; border-radius: 10px;
    font-weight: 600; letter-spacing: 0.04em;
  }

 /* MOBILE TABLE */
@media (max-width: 768px) {

  .results-card {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  table {
    min-width: 700px;
  }

  th,
  td {
    padding: 10px 12px;
    font-size: 12px;
  }

  .code {
    font-size: 11px;
    word-break: break-word;
  }

  main {
    padding: 0 12px;
  }

  .search-box {
    padding: 20px 16px;
  }

  .search-row {
    flex-wrap: wrap;
  }

  #result-count {
    margin-left: 0;
    width: 100%;
  }
}
</style>
</head>

const lookup = {};
PRICE_DATA.forEach(r => {
  const key = String(r.toshiba_modellbezeichnung).trim().toUpperCase();
  if (key) lookup[key] = r;
});

function parsePrice(raw) {
  if (!raw || raw === 'not_found') return null;
  const s = String(raw).replace(/[€\s]/g, '').replace(/\./g, '').replace(',', '.');
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

function formatEur(n) {
  return '€\u00a0' + n.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function togglePw() {
  const pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
}

function doLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  const err = document.getElementById('login-error');
  if (u === 'viessmann' && p === 'carrier') {
    err.style.display = 'none';
    document.getElementById('login-screen-wrap').style.display = 'none';
    const app = document.getElementById('app-screen');
    app.style.display = 'flex';
  } else {
    err.style.display = 'block';
  }
}

function doLogout() {
  document.getElementById('login-screen-wrap').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
  doClear();
}

function doSearch() {
  const raw = document.getElementById('search-input').value;
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  const tbody = document.getElementById('results-body');
  const wrap = document.getElementById('results-wrap');
  const countEl = document.getElementById('result-count');

  if (!lines.length) { wrap.style.display = 'none'; countEl.textContent = ''; return; }

  let html = ''; let found = 0;

  lines.forEach((line, i) => {
    const rec = lookup[line.toUpperCase()];
    if (!rec) {
      html += `<tr><td>${i+1}</td><td class="code">${line}</td><td colspan="4"><span class="badge-noinput">nije u bazi</span></td></tr>`;
      return;
    }
    const price = parsePrice(rec.price);
    const vcs = rec.vcs_materialnummer || '-';
    found++;
    if (price === null) {
      html += `<tr><td>${i+1}</td><td class="code">${line}</td><td class="code">${vcs}</td><td colspan="3"><span class="badge-notfound">nema cijene</span></td></tr>`;
      return;
    }
    html += `<tr>
      <td>${i+1}</td>
      <td class="code">${line}</td>
      <td class="code">${vcs}</td>
      <td class="price-main">${formatEur(price)}</td>
      <td class="price-disc">${formatEur(price * 0.49)}</td>
      <td class="price-disc">${formatEur(price * 0.52)}</td>
    </tr>`;
  });

  tbody.innerHTML = html;
  wrap.style.display = 'block';
  countEl.textContent = found + ' / ' + lines.length + ' nadeno';
}

function doClear() {
  document.getElementById('search-input').value = '';
  document.getElementById('results-wrap').style.display = 'none';
  document.getElementById('result-count').textContent = '';
  document.getElementById('results-body').innerHTML = '';
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
});
</script>
</body>
</html>
